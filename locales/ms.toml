[faq]
faq = "Soalan Lazim (FAQ)"
faq_title = "FAQ DTR"
faq_subtitle = "Soalan lazim mengenai penggunaan penjejak Rekod Masa Harian Tersuai."
faq_back_to_dtr = "Kembali ke DTR"
faq_q_what_is_dtr_for = "Apakah kegunaan DTR ini?"
faq_a_what_is_dtr_for = "DTR ini digunakan untuk mencatat waktu OJT harian, refleksi, pencapaian, dan telemetri anda supaya anda boleh menjejak kemajuan dan trend prestasi dari semasa ke semasa."
faq_q_add_daily_entry = "Bagaimanakah cara untuk menambah entri harian?"
faq_a_add_daily_entry_prefix = "Pergi ke halaman utama, tetapkan tarikh dan waktu bekerja, lengkapkan nota anda, kemudian klik"
faq_a_add_daily_entry_suffix = ". Rekod anda disimpan secara tempatan (local) dalam pelayar anda."
faq_q_edit_or_delete = "Bolehkah saya mengedit atau memadam entri?"
faq_a_edit_or_delete = "Ya. Anda boleh menggunakan alat paparan/edit untuk mengemas kini rekod tertentu, memadam entri terakhir, atau mengosongkan semua rekod daripada storan tempatan."
faq_q_what_is_telemetry_view = "Apakah itu Paparan Telemetri?"
faq_a_what_is_telemetry_view = "Paparan Telemetri menyediakan analitik visual seperti rentak (pace), ramalan penyiapan, trend delta, dan penunjuk kesejahteraan berdasarkan log DTR anda."
faq_q_where_is_data_stored = "Di manakah data saya disimpan?"
faq_a_where_is_data_stored = "Data disimpan dalam pelayar anda (localStorage dan IndexedDB untuk imej). Ia tidak disinkronkan secara automatik ke pelayan melainkan pelayan ditambah."
faq_q_icons_not_updating = "Mengapa sesetengah ikon atau perubahan gaya tidak dikemas kini dengan segera?"
faq_a_icons_not_updating = "Pelayar mudah alih mempunyai cache yang kuat. Segarkan semula halaman, kosongkan data/cache tapak, atau buka semula tab selepas kemas kini tema atau ikon."

