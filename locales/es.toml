[faq]
faq = "Preguntas Frecuentes"
faq_title = "Preguntas Frecuentes (DTR)"
faq_subtitle = "Preguntas frecuentes sobre el uso del rastreador de registros diarios."
faq_back_to_dtr = "Volver al DTR"
faq_q_what_is_dtr_for = "¿Para qué sirve este DTR?"
faq_a_what_is_dtr_for = "Este DTR se utiliza para registrar tus horas diarias de OJT, reflexión, logros y telemetría, para que puedas seguir el progreso y las tendencias de rendimiento a lo largo del tiempo."
faq_q_add_daily_entry = "¿Cómo agrego una entrada diaria?"
faq_a_add_daily_entry_prefix = "Ve a la página principal, establece la fecha y las horas trabajadas, completa tus notas y luego haz clic en"
faq_a_add_daily_entry_suffix = ". Tu registro se guarda localmente en tu navegador."
faq_q_edit_or_delete = "¿Puedo editar o eliminar entradas?"
faq_a_edit_or_delete = "Sí. Puedes usar las herramientas de visor/edición para actualizar un registro específico, eliminar la última entrada o borrar todos los registros del almacenamiento local."
faq_q_what_is_telemetry_view = "¿Qué es la Vista de Telemetría?"
faq_a_what_is_telemetry_view = "La Vista de Telemetría proporciona análisis visuales como ritmo, finalización prevista, tendencias de delta e indicadores de bienestar basados en tus registros del DTR."
faq_q_where_is_data_stored = "¿Dónde se almacenan mis datos?"
faq_a_where_is_data_stored = "Los datos se almacenan en tu navegador (localStorage y IndexedDB para imágenes). No se sincronizan automáticamente con un servidor a menos que agregues uno."
faq_q_icons_not_updating = "¿Por qué algunos íconos o cambios de estilo no se actualizan inmediatamente?"
faq_a_icons_not_updating = "Los navegadores móviles almacenan en caché de forma agresiva. Actualiza la página, borra los datos/caché del sitio o vuelve a abrir la pestaña después de actualizaciones de tema/íconos."

