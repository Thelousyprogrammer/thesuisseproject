[faq]
faq = "Hỏi đáp (FAQ)"
faq_title = "DTR FAQ"
faq_subtitle = "Các câu hỏi thường gặp về việc sử dụng trình theo dõi hồ sơ hàng ngày."
faq_back_to_dtr = "Quay lại DTR"
faq_q_what_is_dtr_for = "DTR này dùng để làm gì?"
faq_a_what_is_dtr_for = "DTR này được sử dụng để ghi lại giờ thực tập (OJT), phản hồi, thành tích và dữ liệu viễn trắc hàng ngày để bạn có thể theo dõi tiến độ và xu hướng hiệu suất theo thời gian."
faq_q_add_daily_entry = "Làm thế nào để thêm một mục hàng ngày?"
faq_a_add_daily_entry_prefix = "Đi tới trang chính, đặt ngày và số giờ làm việc, hoàn thành ghi chú của bạn, sau đó nhấp vào"
faq_a_add_daily_entry_suffix = ". Bản ghi của bạn được lưu cục bộ trong trình duyệt."
faq_q_edit_or_delete = "Tôi có thể chỉnh sửa hoặc xóa các mục không?"
faq_a_edit_or_delete = "Có. Bạn có thể sử dụng các công cụ xem/chỉnh sửa để cập nhật một bản ghi cụ thể, xóa mục cuối cùng hoặc xóa tất cả các bản ghi khỏi bộ nhớ cục bộ."
faq_q_what_is_telemetry_view = "Chế độ xem Viễn trắc là gì?"
faq_a_what_is_telemetry_view = "Chế độ xem Viễn trắc cung cấp các phân tích trực quan như nhịp độ, dự báo hoàn thành, xu hướng delta và các chỉ số sức khỏe dựa trên nhật ký DTR của bạn."
faq_q_where_is_data_stored = "Dữ liệu của tôi được lưu trữ ở đâu?"
faq_a_where_is_data_stored = "Dữ liệu được lưu trữ trong trình duyệt của bạn (localStorage và IndexedDB cho hình ảnh). Nó không được tự động đồng bộ hóa với máy chủ trừ khi có máy chủ được thêm vào."
faq_q_icons_not_updating = "Tại sao một số biểu tượng hoặc thay đổi kiểu dáng không được cập nhật ngay lập tức?"
faq_a_icons_not_updating = "Trình duyệt di động lưu bộ nhớ đệm rất mạnh. Hãy làm mới trang, xóa dữ liệu/bộ nhớ đệm của trang web hoặc mở lại tab sau khi cập nhật chủ đề hoặc biểu tượng."

