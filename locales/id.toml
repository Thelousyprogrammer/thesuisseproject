[faq]
faq = "FAQ"
faq_title = "FAQ DTR"
faq_subtitle = "Pertanyaan umum tentang penggunaan pelacak Catatan Waktu Harian Kustom."
faq_back_to_dtr = "Kembali ke DTR"
faq_q_what_is_dtr_for = "Untuk apa DTR ini?"
faq_a_what_is_dtr_for = "DTR ini digunakan untuk mencatat jam OJT harian, refleksi, pencapaian, dan telemetri sehingga Anda dapat melacak kemajuan dan tren performa dari waktu ke waktu."
faq_q_add_daily_entry = "Bagaimana cara menambah entri harian?"
faq_a_add_daily_entry_prefix = "Buka halaman utama, atur tanggal dan jam kerja, lengkapi catatan Anda, lalu klik"
faq_a_add_daily_entry_suffix = ". Catatan Anda disimpan secara lokal di browser Anda."
faq_q_edit_or_delete = "Bisakah saya mengedit atau menghapus entri?"
faq_a_edit_or_delete = "Ya. Anda dapat menggunakan alat penampil/edit untuk memperbarui catatan tertentu, menghapus entri terakhir, atau menghapus semua catatan dari penyimpanan lokal."
faq_q_what_is_telemetry_view = "Apa itu Tampilan Telemetri?"
faq_a_what_is_telemetry_view = "Tampilan Telemetri menyediakan analitik visual seperti ritme, perkiraan penyelesaian, tren delta, dan indikator kesejahteraan berdasarkan log DTR Anda."
faq_q_where_is_data_stored = "Di mana data saya disimpan?"
faq_a_where_is_data_stored = "Data disimpan di browser Anda (localStorage dan IndexedDB untuk gambar). Data tidak disinkronkan secara otomatis ke server kecuali jika server ditambahkan."
faq_q_icons_not_updating = "Mengapa beberapa ikon atau perubahan gaya tidak langsung diperbarui?"
faq_a_icons_not_updating = "Browser seluler melakukan cache dengan agresif. Refresh halaman, hapus data/cache situs, atau buka kembali tab setelah pembaruan tema atau ikon."

