[faq]
faq = "よくある質問 (FAQ)"
faq_title = "DTR FAQ"
faq_subtitle = "カスタム日次時間記録トラッカーの使用に関する一般的な質問。"
faq_back_to_dtr = "DTRに戻る"
faq_q_what_is_dtr_for = "このDTRは何のためのものですか？"
faq_a_what_is_dtr_for = "このDTRは、日々のOJT時間、振り返り、実績、およびテレメトリを記録し、時間の経過とともに進捗とパフォーマンスの傾向を追跡するために使用されます。"
faq_q_add_daily_entry = "日次エントリを追加するにはどうすればよいですか？"
faq_a_add_daily_entry_prefix = "メインページに移動し、日付と労働時間を設定して、メモを記入してから"
faq_a_add_daily_entry_suffix = "をクリックしてください。記録はブラウザにローカルに保存されます。"
faq_q_edit_or_delete = "エントリを編集または削除できますか？"
faq_a_edit_or_delete = "はい。ビューア/編集ツールを使用して、特定の記録の更新、最後のエントリの削除、またはローカルストレージからの全記録の消去が可能です。"
faq_q_what_is_telemetry_view = "テレメトリビューとは何ですか？"
faq_a_what_is_telemetry_view = "テレメトリビューは、DTRログに基づいて、ペース、完了予測、デルタトレンド、ウェルネス指標などの視覚的な分析を提供します。"
faq_q_where_is_data_stored = "データはどこに保存されますか？"
faq_a_where_is_data_stored = "データはブラウザ（localStorageおよび画像用のIndexedDB）に保存されます。サーバーを追加しない限り、自動的に同期されることはありません。"
faq_q_icons_not_updating = "一部のアイコンやスタイルの変更がすぐに更新されないのはなぜですか？"
faq_a_icons_not_updating = "モバイルブラウザは強力なキャッシュを行います。ページを更新するか、サイトのデータ/キャッシュをクリアするか、テーマやアイコンの更新後にタブを再度開いてください。"

