[faq]
faq = "FAQ"
faq_title = "DTR FAQ"
faq_subtitle = "Häufige Fragen zur Nutzung der täglichen Zeiterfassung."
faq_back_to_dtr = "Zurück zu DTR"
faq_q_what_is_dtr_for = "Wofür ist diese DTR gedacht?"
faq_a_what_is_dtr_for = "Diese DTR dient dazu, Ihre täglichen OJT-Stunden, Reflexionen, Leistungen und Telemetriedaten zu protokollieren, damit Sie Fortschritte und Leistungstrends im Zeitverlauf verfolgen können."
faq_q_add_daily_entry = "Wie füge ich einen täglichen Eintrag hinzu?"
faq_a_add_daily_entry_prefix = "Gehen Sie zur Hauptseite, legen Sie Datum und Arbeitsstunden fest, vervollständigen Sie Ihre Notizen und klicken Sie auf"
faq_a_add_daily_entry_suffix = ". Ihr Datensatz wird lokal in Ihrem Browser gespeichert."
faq_q_edit_or_delete = "Kann ich Einträge bearbeiten oder löschen?"
faq_a_edit_or_delete = "Ja. Sie können die Anzeige-/Bearbeitungstools nutzen, um einen Datensatz zu aktualisieren, den letzten Eintrag zu löschen oder alle Datensätze aus dem lokalen Speicher zu entfernen."
faq_q_what_is_telemetry_view = "Was ist die Telemetrie-Ansicht?"
faq_a_what_is_telemetry_view = "Die Telemetrie-Ansicht bietet visuelle Analysen wie Tempo, Prognose der Fertigstellung, Delta-Trends und Wellness-Indikatoren basierend auf Ihren DTR-Protokollen."
faq_q_where_is_data_stored = "Wo werden meine Daten gespeichert?"
faq_a_where_is_data_stored = "Die Daten werden in Ihrem Browser gespeichert (localStorage und IndexedDB für Bilder). Sie werden nicht automatisch mit einem Server synchronisiert, es sei denn, Sie fügen einen hinzu."
faq_q_icons_not_updating = "Warum werden einige Icons oder Stiländerungen nicht sofort aktualisiert?"
faq_a_icons_not_updating = "Mobile Browser nutzen aggressives Caching. Aktualisieren Sie die Seite, löschen Sie die Website-Daten/Cache oder öffnen Sie den Tab nach Theme- oder Icon-Updates neu."

