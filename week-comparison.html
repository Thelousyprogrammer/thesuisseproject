<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="week_comparison_title">Week Comparison | DTR Telemetry</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/telemetry.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        .comparison-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            overflow: hidden;
        }
        .comparison-table th, .comparison-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .comparison-table th {
            background: rgba(255,255,255,0.05);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--accent);
        }
        .growth-positive { color: var(--level-2); font-weight: bold; }
        .growth-negative { color: var(--accent); font-weight: bold; }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .summary-card h3 { font-size: 0.8rem; margin-bottom: 10px; opacity: 0.7; }
        .summary-card strong { font-size: 1.8rem; display: block; color: var(--accent); }
    </style>
    <script>
        const savedTheme = localStorage.getItem('user-theme') || 'f1';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body class="telemetry-page">

<div class="comparison-container">
    <header class="telemetry-header card">
        <div class="telemetry-header-inner">
            <h1 data-i18n="telemetry_weekly_comparison_view">Weekly Comparison View</h1>
            <div class="telemetry-header-actions">
                <button class="telemetry-btn" onclick="window.location.href='telemetry.html'" data-i18n="back_to_telemetry">Back to Telemetry</button>
            </div>
        </div>
    </header>

    <div class="summary-cards">
        <div class="summary-card">
            <h3 data-i18n="total_ojt_hours">Total OJT Hours</h3>
            <strong id="grandTotalHours">0.0h</strong>
        </div>
        <div class="summary-card">
            <h3 data-i18n="total_personal_hours">Total Personal Hours</h3>
            <strong id="grandTotalPersonal">0.0h</strong>
        </div>
    </div>

    <div class="card">
        <h3 data-i18n="weekly_effort_trend">Weekly Effort Trend</h3>
        <div class="chart-wrap" style="height: 300px; margin-bottom: 20px;">
            <canvas id="growthChart"></canvas>
        </div>
        <table class="comparison-table">
            <thead>
                <tr>
                    <th data-i18n="week_period">Week Period</th>
                    <th data-i18n="chart_effort_ojt">OJT Hours</th>
                    <th data-i18n="chart_effort_personal">Personal Hours</th>
                    <th data-i18n="effort_gain_pct">Effort Gain (%)</th>
                    <th data-i18n="time_efficiency">Time Efficiency</th>
                </tr>
            </thead>
            <tbody id="comparisonTableBody">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="scripts/dtr-core.js"></script>
<script src="scripts/dtr-storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@iarna/toml@2.2.5/dist/index.min.js"></script>
<script src="scripts/dtr-i18n.js"></script>
<script src="scripts/week-comparison.js"></script>
<script>
    if (window.DTRI18N && typeof window.DTRI18N.bootstrap === "function") {
      window.DTRI18N.bootstrap();
    }
</script>
</body>
</html>
